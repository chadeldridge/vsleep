[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "warn"
ignore = []

[licenses]
allow = [
    "Apache-2.0",
#    "BSD-2-Clause",
#    "BSD-3-Clause",
#    "CC0-1.0",
#    "ISC",
    "MIT",
#    "MIT-0",
#    "MPL-2.0",
    "Unicode-3.0",
#    "Zlib",
]
unused-allowed-license = "warn"
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# Private organization sources allowed
[sources.allow-org]
github = []
gitlab = []
bitbucket = []