name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and did not find a duplicate or a previous rejection of this idea.
          required: true

  - type: textarea
    attributes:
      label: Problem or motivation
      description: >
        What problem does this solve, or what use case does it enable?
        Concrete examples are more persuasive than abstract descriptions.
      placeholder: "When I run vsleep in a script, I have no way to..."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed solution
      description: >
        Describe what you'd like to see. If it involves new flags or output,
        show what the interface would look like.
      placeholder: |
        Add a `--quiet` flag that suppresses all output:
          vsleep --quiet 30
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional context
    validations:
      required: false
