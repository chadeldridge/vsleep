version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: scope
    # Patch updates are grouped into a single PR to reduce noise.
    # Minor and major updates remain separate for explicit review.
    groups:
      cargo-patch:
        update-types:
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: scope
    # All Actions updates are grouped — they are infrastructure, not API surface.
    groups:
      github-actions:
        patterns:
          - "*"
