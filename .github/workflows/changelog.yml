# Barrowed from bat
name: Changelog
on:
  workflow_dispatch:
  pull_request:

jobs:
  check-changelog:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.number }}
      PR_BASE: ${{ github.base_ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Fetch Base
        run: git fetch --no-tags --prune --depth=1 origin
      - name: Get PR Submitter
        id: get-submitter
        run: curl -sSfL https://api.github.com/repos/celdridge/vsleep/pulls/${PR_NUMBER} | jq -r '"submitter=" + .user.login' | tee -a $GITHUB_OUTPUT
      - name: Check Changelog
        env:
          PR_SUBMITTER: ${{ steps.get-submitter.outputs.submitter }}
        run: |
          ADDED=$(git diff -U0 "origin/${PR_BASE}" HEAD -- CHANGELOG.md | grep -P '^\+[^\+].+$')
          echo "Added lines in CHANGELOG.md:"
          echo "$ADDED"
          echo "Grepping for PR info (see CONTRIBUTING.md):"
          grep "#${PR_NUMBER}\\b.*${PR_SUBMITTER}\\b" <<< "$ADDED"
